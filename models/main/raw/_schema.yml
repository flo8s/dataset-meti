version: 2

models:
  - name: raw_ita_monthly
    description: 第３次産業活動指数（2020年基準）月次の生データ（季節調整済指数・原指数）
    columns:
      - name: item_code
        description: 品目番号
      - name: item_name
        description: 品目名称（業種名）
      - name: weight
        description: ウエイト（2020年基準）
      - name: series_type
        description: 系列種別コード（seasonally_adjusted / original）
      - name: series_type_ja
        description: 系列種別名（季節調整済指数 / 原指数）
      - name: year_month
        description: 年月（YYYYMM）
      - name: index_value
        description: 指数値（2020年=100）
